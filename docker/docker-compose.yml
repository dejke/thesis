include:
  - targets/${TARGET:?Set TARGET to a target name}/target.yml

services:
  executor:
    build: ./executor
    volumes:
      - target-src:/target-src:ro
    networks:
      - exposed

  threat-modeler:
    build: ./threat-modeler
    volumes:
      - target-src:/target-src:ro
networks:
  exposed:
    internal: true
  closed:
    internal: true

volumes:
  target-src:
