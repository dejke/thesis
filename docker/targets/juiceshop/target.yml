services:
  juiceshop:
    image: bkimminich/juice-shop:v19.2.1
    networks:
      - exposed
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "require('http').get('http://localhost:3000/', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  src-fetch:
    image: alpine/git
    entrypoint: ["/bin/sh", "-c"]
    command: ["git clone --depth=1 --branch=v19.2.1 https://github.com/juice-shop/juice-shop.git /target-src"]
    volumes:
      - target-src:/target-src

