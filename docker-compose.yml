include:
  - targets/${TARGET:?Set TARGET to a target name}/target.yml

services:
  attacker:
    build: ./attacker
    container_name: attacker
    volumes: 
      - target_src:/target-src:ro
    networks:
      - exposed

networks:
  exposed: # network the attacker sees
    internal: true
  closed: # network between the target services
    internal: true

volumes: 
  target-src:
  
